<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Helix Client — EaglercraftX Launcher</title>
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0b0c10;
    color: #cdd6f4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── Animated star background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(76,158,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(137,80,255,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── Card ── */
  .card {
    background: rgba(17, 17, 27, 0.92);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px;
    padding: 40px 48px 36px;
    width: 440px;
    box-shadow:
      0 0 0 1px rgba(76,158,255,0.08),
      0 32px 64px rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 1;
  }

  /* ── Logo area ── */
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #4c9eff, #8950ff);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(76,158,255,0.35);
  }
  .logo h1 {
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(90deg, #4c9eff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .logo .version {
    font-size: 12px;
    color: #585b70;
    margin-top: 4px;
    font-weight: 500;
  }

  /* ── Section labels ── */
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #585b70;
    margin-bottom: 6px;
    margin-top: 20px;
  }
  label:first-of-type { margin-top: 0; }

  /* ── Inputs ── */
  input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    background: #1e1e2e;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    color: #cdd6f4;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus {
    border-color: rgba(76,158,255,0.5);
  }
  input[type="text"]::placeholder { color: #45475a; }

  /* ── Server row ── */
  .server-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .server-row input { flex: 1; }
  .badge {
    background: rgba(76,158,255,0.15);
    color: #4c9eff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 4px;
    white-space: nowrap;
    border: 1px solid rgba(76,158,255,0.2);
  }

  /* ── Status indicator ── */
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding: 10px 14px;
    background: #1e1e2e;
    border-radius: 8px;
    font-size: 12px;
    color: #a6adc8;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #a6e3a1;
    box-shadow: 0 0 6px #a6e3a1;
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(0.85); }
  }

  /* ── Launch button ── */
  .launch-btn {
    width: 100%;
    margin-top: 26px;
    padding: 14px;
    background: linear-gradient(135deg, #4c9eff, #8950ff);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(76,158,255,0.3);
  }
  .launch-btn:hover {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 10px 28px rgba(76,158,255,0.4);
  }
  .launch-btn:active {
    transform: translateY(0);
    box-shadow: 0 4px 12px rgba(76,158,255,0.2);
  }

  /* ── Feature pills ── */
  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 22px;
  }
  .pill {
    background: #1e1e2e;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: #7f849c;
  }

  /* ── Footer ── */
  footer {
    margin-top: 24px;
    font-size: 11px;
    color: #313244;
    text-align: center;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="card">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">⚔️</div>
    <h1>Helix Client</h1>
    <div class="version">v1.0.0 · EaglercraftX 1.8.8</div>
  </div>

  <!-- Username -->
  <label>Username</label>
  <input type="text" id="username" placeholder="Enter your name" value="Player"/>

  <!-- Server -->
  <label>Server</label>
  <div class="server-row">
    <input type="text" id="server"
           value="wss://crackedpvp.club/connect"
           placeholder="wss://server:port/path"/>
    <span class="badge">ViaVersion</span>
  </div>

  <!-- Status -->
  <div class="status">
    <div class="dot"></div>
    <span>crackedpvp.club — online</span>
  </div>

  <!-- Launch -->
  <button class="launch-btn" onclick="launch()">▶ &nbsp;Launch</button>

  <!-- Feature pills -->
  <div class="features">
    <span class="pill">ToggleSprint</span>
    <span class="pill">Fullbright</span>
    <span class="pill">Zoom (C)</span>
    <span class="pill">NoHurtCam</span>
    <span class="pill">Keystrokes HUD</span>
    <span class="pill">ArrayList</span>
    <span class="pill">CPS Counter</span>
    <span class="pill">Netherite Items</span>
    <span class="pill">Mace</span>
    <span class="pill">ClickGUI (RShift)</span>
  </div>
</div>

<footer>Helix Client · for crackedpvp.club · not affiliated with Mojang</footer>

<script>
  function launch() {
    const username = document.getElementById('username').value.trim();
    const server   = document.getElementById('server').value.trim();

    if (!username) {
      alert('Please enter a username.');
      return;
    }
    if (!server.startsWith('wss://') && !server.startsWith('ws://')) {
      alert('Server must start with wss:// or ws://');
      return;
    }

    // Build URL params for EaglercraftX standard loader
    // Adjust param names to match whatever EaglercraftX's index.html expects
    const params = new URLSearchParams({
      server:   server,
      username: username
    });

    // If the Eaglercraft game is in a sibling file called "game.html":
    // window.location.href = 'game.html?' + params.toString();

    // If it's an iframe in this same page, you can postMessage:
    // document.getElementById('game-frame').src = 'game.html?' + params.toString();

    // For now, open in the same window (adjust path to your built .html):
    window.location.href = 'index.html?' + params.toString();
  }

  // Pre-fill username from localStorage if saved
  const saved = localStorage.getItem('mc_username');
  if (saved) document.getElementById('username').value = saved;

  document.getElementById('username').addEventListener('change', e => {
    localStorage.setItem('mc_username', e.target.value);
  });
</script>
</body>
</html>
